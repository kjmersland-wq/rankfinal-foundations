name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Lint
        run: npm run lint
        continue-on-error: true  # Allow lint warnings
      
      - name: Run tests
        run: npm run test
        continue-on-error: true  # Tests may not exist yet
      
      - name: Build Next.js
        run: npm run build
        env:
          # Required for build (use dummy values for CI)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://dummy.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'dummy-key' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'dummy-id' }}
      
      - name: Security audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      
      - name: Check build output
        run: |
          echo "✅ Next.js build successful"
          echo "Build directory:"
          ls -lh .next/
          echo ""
          echo "Static pages generated:"
          find .next/server/app -name "*.html" | wc -l || echo "0"
          echo ""
          echo "Routes generated:"
          if [ -d ".next/server/app" ]; then
            find .next/server/app -type f -name "*.rsc" | wc -l || echo "0"
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7
